name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pull-requests: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Stub WASM parser for typecheck
        run: |
          mkdir -p packages/lean-parser-rs/pkg
          printf '{"name":"lean-parser-rs","version":"0.1.0","types":"index.d.ts","main":"index.js"}\n' > packages/lean-parser-rs/pkg/package.json
          printf 'export function parse(input: string): any;\nexport function initParser(): Promise<void>;\n' > packages/lean-parser-rs/pkg/index.d.ts
          printf 'module.exports = {};\n' > packages/lean-parser-rs/pkg/index.js

      - name: Build packages (create dist/)
        run: npm run build:ts

      - name: Type check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Security audit
        run: npm audit --audit-level=high || echo "npm audit found issues (check output)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM parser
        run: cd packages/lean-parser-rs && wasm-pack build --target bundler --out-dir pkg

      - name: Verify WASM build
        run: |
          cd packages/lean-parser-rs
          test -f pkg/lean_parser_rs_bg.wasm
          test -f pkg/lean_parser_rs.js

      - name: Cargo audit
        run: cargo install cargo-audit 2>/dev/null; cd packages/lean-parser-rs && cargo audit || echo "Cargo audit skipped or found issues"

  release:
    runs-on: ubuntu-latest
    needs: [build, lint, wasm]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Build all packages
        run: npm run build
      - name: Publish to npm
        run: |
          npx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish VS Code extension
        run: npx vsce publish -p $VSCE_TOKEN || echo "VS Code publish skipped"
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        working-directory: packages/vscode
