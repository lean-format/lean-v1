name: Deploy LEAN Format

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  GITHUB_PAGES: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Stub WASM parser
        run: |
          mkdir -p packages/lean-parser-rs/pkg
          printf '{"name":"lean-parser-rs","version":"0.1.0","types":"index.d.ts","main":"index.js"}\n' > packages/lean-parser-rs/pkg/package.json
          printf 'export function parse(input: string): any;\nexport function initParser(): Promise<void>;\n' > packages/lean-parser-rs/pkg/index.d.ts
          printf 'module.exports = {};\n' > packages/lean-parser-rs/pkg/index.js

      - name: Build core packages
        run: npm run build:ts

      - name: Build Website
        run: npm run build:app -w packages/website
        env:
          GITHUB_PAGES: 'true'
          NODE_ENV: 'production'

      - name: Build Playground
        run: npm run build:app -w packages/playground

      - name: Prepare Deployment
        run: |
          mkdir -p packages/website/out/playground
          cp -r packages/playground/dist/* packages/website/out/playground/

      - name: Add .nojekyll file
        run: touch packages/website/out/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: packages/website/out
          branch: gh-pages
          clean: true